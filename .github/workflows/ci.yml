name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo bench --no-run
        if: matrix.os == 'ubuntu-latest'
  node-test:
    # Guards the npm distribution layer (npm/ launcher, scripts/ generator) and
    # the Claude Code plugin broker. Runs on Windows too because the generator
    # shells out to `npm pack` and the Windows npm.cmd/execSync path is exactly
    # what broke during development. The plugin tests ALSO need ubuntu-latest:
    # the broker's loser-exits-without-unlinking behavior (C1) only exists on
    # POSIX (`process.platform !== "win32"` guards it) — a Windows-only matrix
    # would never have caught it, which is exactly what happened.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test npm/topodb-mcp/test/launcher.test.js
      - run: node --test scripts/test/build-npm-packages.test.mjs
      - run: npm install --no-audit --no-fund
        working-directory: plugins/claude-code
      - run: npm test
        working-directory: plugins/claude-code
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
